services:
  his-shell:
    build: { context: ./his-shell, dockerfile: Dockerfile }
    ports: ["8080:80"]
    networks: [his-network]

  his-patient-mfe:
    build: { context: ./his-patient-mfe, dockerfile: Dockerfile }
    ports: ["8081:80"]
    networks: [his-network]

  his-pharmacy-mfe:
    build: { context: ./his-pharmacy-mfe, dockerfile: Dockerfile }
    ports: ["8082:80"]
    networks: [his-network]

  his-central-mfe:
    build: { context: ./his-central-mfe, dockerfile: Dockerfile }
    ports: ["8083:80"]
    networks: [his-network]

  # ── EMR Shell ──────────────────────────────────────────
  his-emr-shell:
    build: { context: ./his-emr-shell, dockerfile: Dockerfile }
    ports: ["8090:80"]
    networks: [his-network]

  # ── EMR Sub-MFEs (Always Visible) ──────────────────────
  emr-facesheet-mfe:
    build: { context: ./emr-facesheet-mfe, dockerfile: Dockerfile }
    ports: ["8091:80"]
    networks: [his-network]

  emr-vitals-mfe:
    build: { context: ./emr-vitals-mfe, dockerfile: Dockerfile }
    ports: ["8092:80"]
    networks: [his-network]

  emr-diseases-mfe:
    build: { context: ./emr-diseases-mfe, dockerfile: Dockerfile }
    ports: ["8093:80"]
    networks: [his-network]

  emr-history-mfe:
    build: { context: ./emr-history-mfe, dockerfile: Dockerfile }
    ports: ["8094:80"]
    networks: [his-network]

  emr-allergies-mfe:
    build: { context: ./emr-allergies-mfe, dockerfile: Dockerfile }
    ports: ["8095:80"]
    networks: [his-network]

  # ── EMR Sub-MFEs (On-Demand) ───────────────────────────
  emr-notes-mfe:
    build: { context: ./emr-notes-mfe, dockerfile: Dockerfile }
    ports: ["8096:80"]
    networks: [his-network]

  emr-medications-mfe:
    build: { context: ./emr-medications-mfe, dockerfile: Dockerfile }
    ports: ["8097:80"]
    networks: [his-network]

  emr-labs-mfe:
    build: { context: ./emr-labs-mfe, dockerfile: Dockerfile }
    ports: ["8098:80"]
    networks: [his-network]

  emr-radiology-mfe:
    build: { context: ./emr-radiology-mfe, dockerfile: Dockerfile }
    ports: ["8099:80"]
    networks: [his-network]

  emr-procedures-mfe:
    build: { context: ./emr-procedures-mfe, dockerfile: Dockerfile }
    ports: ["8100:80"]
    networks: [his-network]

  emr-appointments-mfe:
    build: { context: ./emr-appointments-mfe, dockerfile: Dockerfile }
    ports: ["8101:80"]
    networks: [his-network]

  # ── Shared Library & Custom MFEs ──────────────────────────
  his-shared-lib:
    build: { context: ./his-shared-lib, dockerfile: Dockerfile }
    ports: ["8200:80"]
    networks: [his-network]

  his-lab-mfe:
    build: { context: ./his-lab-mfe, dockerfile: Dockerfile }
    ports: ["8102:80"]
    networks: [his-network]

networks:
  his-network:
    driver: bridge

